services:
  postgres:
    image: postgres:16
    container_name: sima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sima}
      POSTGRES_USER: ${POSTGRES_USER:-sima}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sima}
    ports:
      - "5432:5432"
    volumes:
      - sima_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sima} -d ${POSTGRES_DB:-sima}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sima_pgdata:
