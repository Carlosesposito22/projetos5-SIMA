services:
  postgres:
    image: postgres:16
    container_name: sima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sima}
      POSTGRES_USER: ${POSTGRES_USER:-sima}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sima}
    ports:
      - "5432:5432"
    volumes:
      - sima_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sima} -d ${POSTGRES_DB:-sima}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sima-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Sobrescreve DATABASE_URL pra resolver o Postgres pelo hostname do compose.
      DATABASE_URL: postgres://${POSTGRES_USER:-sima}:${POSTGRES_PASSWORD:-sima}@postgres:5432/${POSTGRES_DB:-sima}
    ports:
      - "8000:8000"
    # Sobrescreve o CMD do Dockerfile: em dev usa runserver com hot-reload.
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Bind do código pra refletir mudanças sem rebuild (runserver tem auto-reload).
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sima-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Volume anônimo pra que o node_modules do container não seja sobrescrito
      # pelo bind do host (que pode estar vazio ou ter binários incompatíveis).
      - /app/node_modules
    depends_on:
      - backend

  streamlit:
    build:
      context: ./ml
    container_name: sima-streamlit
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sima}:${POSTGRES_PASSWORD:-sima}@postgres:5432/${POSTGRES_DB:-sima}
    ports:
      - "8501:8501"
    volumes:
      # Bind do código pra hot-reload em desenvolvimento.
      - ./ml:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sima_pgdata:
