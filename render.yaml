services:
  - type: web
    name: sima-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Preencher no dashboard do Render após criar o serviço:
      # DATABASE_URL        → connection string do Supabase (com ?sslmode=require)
      # ALLOWED_HOSTS       → sima-backend.onrender.com
      # CORS_ALLOWED_ORIGINS → https://seu-projeto.vercel.app
      # CSRF_TRUSTED_ORIGINS → https://sima-backend.onrender.com
      # SIMA_APP_URL         → https://seu-projeto.vercel.app

  - type: web
    name: sima-analytics
    runtime: docker
    dockerfilePath: ./ml/Dockerfile
    dockerContext: ./ml
    envVars:
      - key: DATABASE_URL
        sync: false
        # Preencher no dashboard do Render com a mesma connection string do Supabase
        # usada pelo backend (com ?sslmode=require)
        # Exemplo: postgresql://user:pass@db.supabase.co:5432/postgres?sslmode=require
      - key: N_RELATOS
        value: "800"
        # Número de relatos simulados a gerar na primeira inicialização.
        # O script é idempotente: não insere se já houver >= 400 relatos.
